<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reino Final</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    font-family: 'Cinzel', serif;
    overflow: hidden;
    background: black;
    color: #f5e6d3;
}

/* 🌑 INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

/* 🌧️ lluvia */
#rain {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.drop {
    position: absolute;
    width: 1px;
    height: 80px;
    background: rgba(180, 200, 255, 0.3);
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-100vh); }
    100% { transform: translateY(100vh); }
}

/* intro box */
#introBox {
    position: relative;
    z-index: 2;
    text-align: center;
}

#introBox h1 {
    font-size: 42px;
    color: #ffe7b3;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px gold; }
}

/* ⚔️ espada */
#espada {
    font-size: 70px;
    cursor: pointer;
    margin-top: 20px;
    animation: float 2s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0); }
}

/* 🎂 FINAL */
#final {
    display: none;
    height: 100vh;
    width: 100%;
    position: fixed;
    top: 0;
    left: 0;
    background: radial-gradient(circle at top, #1b2a3a, #000);
    overflow: hidden;
}

/* ✨ brillos mágicos */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px gold;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* contenido */
#contenido {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 120px;
    max-width: 700px;
    margin: auto;
}

#contenido h1 {
    font-size: 44px;
    color: #ffe7b3;
    text-shadow: 0 0 20px gold;
}

/* 📜 BOTÓN PERGAMINO */
#btnInicio {
    position: absolute;
    bottom: 20px;
    right: 20px;

    font-family: 'Cinzel', serif;
    font-size: 12px;

    padding: 6px 12px;
    border: 1px solid #c9a66b;
    border-radius: 8px;

    background: rgba(245, 230, 200, 0.12);
    color: #f5e6d3;

    cursor: pointer;
    opacity: 0.7;

    transition: all 0.3s ease;
}

/* ✨ hover mágico */
#btnInicio:hover {
    opacity: 1;
    transform: scale(1.08);
    background: rgba(245, 230, 200, 0.25);
    box-shadow: 0 0 15px rgba(201,166,107,0.5);
}

/* 📜 animación click tipo mapa */
#btnInicio:active {
    transform: scale(0.95);
}

</style>
</head>

<body>

<!-- 🔊 sonidos -->
<audio id="espadaSonido">
  <source src="Audio/sonido.mp3" type="audio/mpeg">
</audio>

<audio id="musica" loop>
  <source src="Audio/relax.mp3" type="audio/mpeg">
</audio>

<!-- 🌑 INTRO -->
<div id="intro">

    <div id="rain"></div>

    <div id="introBox">
        <h1> Toma la espada</h1>
        <div id="espada">🗡️</div>
    </div>

</div>

<!-- 🎂 FINAL -->
<div id="final">

    <div id="contenido">
        <h1>🎉 ¡Feliz Cumpleaños mi amor!</h1>
        <p>
            Este reino te pertenece ahora.<br><br>
            Gracias por entrar a esta aventura.<br><br>
            Siempre habrá un lugar para ti aquí.
        </p>
    </div>

    <!-- 📜 NUEVA PARTIDA -->
    <button id="btnInicio">📜 Nueva partida</button>

</div>

<script>

/* 🌧️ lluvia */
const rain = document.getElementById("rain");

for (let i = 0; i < 80; i++) {
    let drop = document.createElement("div");
    drop.classList.add("drop");

    drop.style.left = Math.random() * 100 + "vw";
    drop.style.animationDuration = (0.5 + Math.random() * 0.8) + "s";

    rain.appendChild(drop);
}

/* ✨ brillos final */
function crearSparkles() {
    const final = document.getElementById("final");

    for (let i = 0; i < 60; i++) {
        let s = document.createElement("div");
        s.classList.add("sparkle");
        s.style.left = Math.random() * 100 + "vw";
        s.style.animationDuration = (2 + Math.random() * 3) + "s";
        final.appendChild(s);
    }
}

/* ⚔️ espada */
const espada = document.getElementById("espada");
const intro = document.getElementById("intro");
const final = document.getElementById("final");

espada.addEventListener("click", function () {

    let sonido = document.getElementById("espadaSonido");
    sonido.currentTime = 0;
    sonido.play();

    setTimeout(() => {

        intro.style.display = "none";
        final.style.display = "block";

        let musica = document.getElementById("musica");
        musica.volume = 0.4;
        musica.play();

        crearSparkles();

    }, 800);

});

/* 📜 BOTÓN NUEVA PARTIDA */
const btn = document.getElementById("btnInicio");

btn.addEventListener("click", () => {

    let sonido = new Audio("Audio/secret.mp3");
    sonido.volume = 0.3;
    sonido.currentTime = 0;
    sonido.play();

    setTimeout(() => {
        window.location.href = "index.html";
    }, 3000);

});

</script>

</body>
</html>
