<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>📜 La Leyenda</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Cinzel Decorative', serif;
  background:black;
  color:#f5e6b3;
  overflow:hidden;
}

/* 🎮 INICIO */
#inicio{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  background:url("IMG WEB/mapa.jpg");
  background-size:cover;
  background-position:center;
}

/* 🌑 capa oscura */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* 📜 caja medieval */
.caja{
  position:relative;
  text-align:center;
  padding:25px;
  max-width:600px;

  border:3px solid #d4af37;
  background:rgba(20,15,10,0.85);

  box-shadow:0 0 25px rgba(0,0,0,0.8);
}

/* 🧙‍♂️ título */
h1{
  font-family:'UnifrakturCook', cursive;
  color:#d4af37;
  text-shadow:2px 2px 10px black;
}

/* 📜 texto intro */
#intro{
  margin-top:15px;
  min-height:80px;
  line-height:1.6;
}

/* 🎮 botones */
button{
  padding:12px 20px;
  margin-top:15px;
  border:2px solid gold;
  background:#2a1b0e;
  color:#f5e6b3;
  cursor:pointer;
  font-family:'Cinzel Decorative';
}

button:hover{
  background:#3a2715;
}

/* 🎵 oculto */
audio{ display:none; }

</style>

</head>

<body>

<!-- 🎵 música (NO autoplay) -->
<audio id="musica" loop>
  <source src="Audio/Zelda.mp3" type="audio/mp3">
</audio>

<!-- 🔊 click -->
<audio id="click">
  <source src="Audio/Korok.mp3" type="audio/mp3">
</audio>

<div id="inicio">

  <div class="caja">

    <h1>📜 LA LEYENDA</h1>

    <div id="intro"></div>

    <button onclick="startGame()">iniciar</button>

  </div>

</div>

<script>

/* ✨ máquina de escribir */
function escribirTexto(id, texto, velocidad = 35){
  let i = 0;
  let el = document.getElementById(id);
  el.innerHTML = "";

  function escribir(){
    if(i < texto.length){
      el.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribir, velocidad);
    }
  }

  escribir();
}

/* 🎮 iniciar */
function startGame(){

  // 🔊 reproducir sonido del botón
  const click = document.getElementById("click");
  click.currentTime = 0;
  click.play();



  // ⏳ esperar 2.5 segundos antes de entrar al juego
  setTimeout(() => {
      window.location.href = "juego.html";
  }, 2500);

}

/* 📜 INTRO */
escribirTexto("intro",
"Una antigua energía ha despertado...\nLa Reina ha enviado un mensaje urgente.\nTu aventura comienza en el castillo...");

</script>

</body>
</html>
